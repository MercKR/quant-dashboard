<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;padding:0 2px;overflow:hidden}
#inp{display:block;width:100%;height:34px;
  background:rgba(205,214,224,.05);border:1px solid rgba(205,214,224,.14);
  border-radius:4px;padding:0 10px;color:#cdd6e0;
  font-family:Arial,'Malgun Gothic',sans-serif;font-size:.82rem;outline:none;transition:border .15s}
#inp:focus{border-color:rgba(90,142,194,.5);background:rgba(90,142,194,.05)}
#inp::placeholder{color:#38445a;font-size:.78rem}
</style></head>
<body>
<input id="inp" type="text" placeholder="티커 · 한국어명 · 영문명으로 검색..." autocomplete="off" spellcheck="false">
<script>
var DB=[];
var P=window.parent,PDOC=P.document;
var dd=null,sel=-1,hits=[],timer=null;

/* DB를 정적 파일로 비동기 로드 */
fetch('/app/static/ticker_db.json')
  .then(function(r){return r.json();})
  .then(function(data){DB=data;})
  .catch(function(){DB=[];});

function dd_init(){
  var d=PDOC.getElementById('__qadd');
  if(!d){
    d=PDOC.createElement('div');
    d.id='__qadd';
    d.style.display='none';
    d.style.position='fixed';
    d.style.zIndex='2147483647';
    d.style.background='#141820';
    d.style.border='1px solid #2d3448';
    d.style.borderRadius='6px';
    d.style.maxHeight='280px';
    d.style.overflowY='auto';
    d.style.overflowX='hidden';
    d.style.boxShadow='0 10px 36px rgba(0,0,0,.9)';
    d.style.fontFamily="Arial,'Malgun Gothic',sans-serif";
    d.style.fontSize='.82rem';
    d.style.scrollbarWidth='thin';
    d.style.scrollbarColor='#2d3448 transparent';
    PDOC.body.appendChild(d);
  }
  dd=d;
  return d;
}

function my_ifr(){
  return Array.from(PDOC.querySelectorAll('iframe')).find(function(f){
    try{return f.contentWindow===window;}catch(e){return false;}
  });
}

function repos(){
  if(!dd)return;
  var fr=my_ifr();
  if(!fr)return;
  var r=fr.getBoundingClientRect();
  dd.style.left=r.left+'px';
  dd.style.top=(r.bottom+3)+'px';
  dd.style.width=r.width+'px';
}

function score(x,ql){
  var t=x.t.toLowerCase(),k=(x.k||'').toLowerCase(),e=(x.e||'').toLowerCase();
  if(t===ql)return 100;
  if(t.startsWith(ql))return 85;
  if(k&&k.startsWith(ql))return 80;
  if(e.startsWith(ql))return 70;
  if(k&&k.includes(ql))return 60;
  if(e.includes(ql))return 50;
  if(t.includes(ql))return 40;
  return 0;
}

function do_search(q){
  var ql=q.toLowerCase();
  var r=[];
  for(var i=0;i<DB.length;i++){var s=score(DB[i],ql);if(s>0)r.push([s,DB[i]]);}
  r.sort(function(a,b){return b[0]-a[0];});
  hits=r.slice(0,12).map(function(x){return x[1];});
  render();
}

function clrHL(){
  if(!dd)return;
  var cs=dd.children;
  for(var i=0;i<cs.length;i++)cs[i].style.background='';
}

function hl(i){
  clrHL();
  if(i>=0&&dd&&dd.children[i]){
    dd.children[i].style.background='#1c2540';
    dd.children[i].scrollIntoView({block:'nearest'});
  }
}

function hide(){if(dd)dd.style.display='none';sel=-1;}

function pick(item){
  var name=item.k||item.e||item.t;
  var cur=new URLSearchParams(P.location.search);
  cur.delete('q_run');
  cur.set('ac_t',item.t);
  cur.set('ac_n',name);
  cur.set('ac_x',item.x);
  var qs='?'+cur.toString();
  try{
    var sc=PDOC.createElement('script');
    sc.textContent='window.location.search='+JSON.stringify(qs)+';';
    PDOC.head.appendChild(sc);
    sc.remove();
  }catch(e){
    try{P.location.search=qs;}catch(e2){}
  }
}

function mk_row(item,i){
  var row=PDOC.createElement('div');
  row.style.padding='7px 12px';
  row.style.cursor='pointer';
  row.style.borderBottom='1px solid rgba(255,255,255,.04)';
  row.style.display='flex';
  row.style.alignItems='center';
  row.style.lineHeight='1.3';

  var t=PDOC.createElement('span');
  t.style.color='#7aaad4';
  t.style.fontWeight='700';
  t.style.minWidth='90px';
  t.style.flexShrink='0';
  t.style.fontSize='.81rem';
  t.textContent=item.t;
  row.appendChild(t);

  if(item.k){
    var kr=PDOC.createElement('span');
    kr.style.color='#cdd6e0';
    kr.style.fontSize='.81rem';
    kr.textContent=item.k;
    row.appendChild(kr);
  }
  if(item.e){
    var en=PDOC.createElement('span');
    en.style.color='#6a7888';
    en.style.fontSize='.74rem';
    en.style.marginLeft=item.k?'5px':'0';
    en.textContent=item.e;
    row.appendChild(en);
  }

  var xc=PDOC.createElement('span');
  xc.style.marginLeft='auto';
  xc.style.color='#3a4558';
  xc.style.fontSize='.71rem';
  xc.style.paddingLeft='8px';
  xc.style.flexShrink='0';
  xc.textContent=item.x;
  row.appendChild(xc);

  row.onmouseenter=function(){clrHL();row.style.background='#1c2540';sel=i;};
  row.onmouseleave=function(){if(sel===i){row.style.background='';sel=-1;}};
  row.onmousedown=function(e){e.preventDefault();pick(item);};
  return row;
}

function render(){
  dd_init();
  dd.innerHTML='';
  sel=-1;
  if(!hits.length){dd.style.display='none';return;}
  for(var i=0;i<hits.length;i++){dd.appendChild(mk_row(hits[i],i));}
  repos();
  dd.style.display='block';
}

var inp=document.getElementById('inp');

inp.addEventListener('input',function(){
  clearTimeout(timer);
  var q=inp.value.trim();
  if(!q){hide();return;}
  timer=setTimeout(function(){do_search(q);},80);
});

inp.addEventListener('keydown',function(e){
  if(!dd||dd.style.display==='none')return;
  if(e.key==='ArrowDown'){e.preventDefault();sel=Math.min(sel+1,hits.length-1);hl(sel);}
  else if(e.key==='ArrowUp'){e.preventDefault();sel=Math.max(sel-1,0);hl(sel);}
  else if(e.key==='Enter'){e.preventDefault();if(sel>=0)pick(hits[sel]);}
  else if(e.key==='Escape'){hide();inp.value='';}
});

inp.addEventListener('blur',function(){setTimeout(hide,200);});

P.addEventListener('scroll',repos,true);
P.addEventListener('resize',repos);
dd_init();
</script></body></html>
